version: "3.9"

services:
  app:
    build:
      context: .
    restart: always
    volumes:
      - static-data:/vol/static  # Matching path for static files
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
    depends_on:
      - db
    ports:
      - "8001:8001"  # Ensure the app exposes the uWSGI port

  db:
    image: postgres:13-alpine
    #restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}

  proxy:
    build:
      context: ./proxy
    #restart: always
    depends_on:
      - app
    ports:
      - "81:8001"  # Change this to 81 to avoid conflict with the app's port
    volumes:
      - static-data:/vol/static  # Ensure it matches app's volume

    frontend:
      image: ${DOCKER_IMAGE_FRONTEND}
      restart: always
      ports:
        - "82:82"

volumes:
  postgres-data:
  static-data:
